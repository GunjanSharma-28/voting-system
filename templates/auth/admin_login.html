<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body{
            margin:0;
            font-family: 'Segoe UI', sans-serif;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(to right,#2b5876,#4e4376);
        }

        .login-box{
            background:white;
            padding:40px;
            width:350px;
            border-radius:12px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            text-align:center;
        }

        h2{
            margin-bottom:30px;
            color:#2b5876;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border-radius:6px;
            border:1px solid #ccc;
            font-size:14px;
        }

        button{
            width:100%;
            padding:12px;
            background: linear-gradient(to right,#2b5876,#4e4376);
            color:white;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            opacity:0.9;
        }

        .back{
            margin-top:15px;
            display:block;
            font-size:14px;
            color:#555;
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Admin Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <a href="/" class="back">← Back to Home</a>
</div>

</body>
</html>
